services:
  nodered:
    image: nodered/node-red:latest
    container_name: iot-gateway
    ports:
      - "1880:1880"
    volumes:
      - nodered-data:/data
    environment:
      - TZ=Europe/Rome
    restart: unless-stopped
    networks:
      - iot-network

  influxdb:
    image: influxdb:2.7
    container_name: timeseries-db
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=industrial
      - DOCKER_INFLUXDB_INIT_BUCKET=iot-data
    restart: unless-stopped
    networks:
      - iot-network

  grafana:
    image: grafana/grafana:latest
    container_name: dashboard
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    depends_on:
      - influxdb
    networks:
      - iot-network

volumes:
  nodered-data:
  influxdb-data:
  grafana-data:

networks:
  iot-network:
    driver: bridge
